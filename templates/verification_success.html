<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified - OrthoConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 48px;
            border-radius: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #f1f5f9;
            transform: translateY(0);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #f0fdf4;
            color: #10b981;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        h1 {
            color: #1e293b;
            font-size: 24px;
            font-weight: 900;
            margin: 0 0 12px;
            tracking-tight: -0.025em;
        }
        p {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 32px;
        }
        .btn {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        .btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <i data-lucide="mail-check" style="width: 40px; height: 40px;"></i>
        </div>
        <h1>Gmail Verified!</h1>
        <p>Your email has been successfully confirmed. You can now return to the <b>OrthoConnect</b> app to login.</p>
        
        <div class="footer">OrthoConnect Security</div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
